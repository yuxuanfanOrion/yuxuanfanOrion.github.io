<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome for icons -->
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

<!-- Academicons -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academicons.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">

<!-- Custom CSS for additional styling -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/custom.css"/>

<!-- Academic Homepage CSS -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/academic.css"/>

<!-- Night theme + starry sky -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/night-theme.css"/>

<!-- Preload frequently opened contact asset -->
<link rel="preload" as="image" href="{{ base_path }}/images/wechat-qr.jpg"/>

<!-- favicon -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#f9f9f9"/>

<!-- Starry Background with Image Rotation -->
<style>
  /* Star background container - only in cover area */
  .stars-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    opacity: 0;
    transition: opacity 2s ease-in-out;
  }
  .stars-bg.active {
    opacity: 1;
  }

  /* Profile cover uses star background */
  .cover {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #1a1a2e;
  }

  /* Profile wrapper - semi-transparent, independent of background */
  .profile-wrapper {
    position: absolute;
    z-index: 10;
    background-color: rgba(255, 255, 255, 0.85) !important;
  }

</style>

<!-- Support for MatJax -->
<script src="https://cdnjs.cloudflare.com/polyfill/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<!-- end custom head snippets -->
